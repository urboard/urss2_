name: Sync CRM appointments

on:
  schedule:
    # 10:13 PM Malaysia time (UTC+8) = 14:13 UTC - off the exact hour, dodges GitHub's peak scheduling congestion
    - cron: '13 14 * * *'
  workflow_dispatch:
    inputs:
      target_date:
        description: 'Force a specific date instead of "tomorrow" (format: DD/Mon/YYYY, e.g. 22/Jul/2026). Leave blank for normal behavior.'
        required: false
        default: ''

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm install firebase-admin csv-parse

      - name: Run sync
        env:
          CRM_TOKEN: ${{ secrets.CRM_TOKEN }}
          CRM_USERNAME: ${{ secrets.CRM_USERNAME }}
          CRM_PASSWORD: ${{ secrets.CRM_PASSWORD }}
          TARGET_DATE: ${{ github.event.inputs.target_date }}
          FIREBASE_SA_GL: ${{ secrets.FIREBASE_SA_GL }}
          FIREBASE_SA_SS2: ${{ secrets.FIREBASE_SA_SS2 }}
          FIREBASE_SA_RU: ${{ secrets.FIREBASE_SA_RU }}
          FIREBASE_SA_MA: ${{ secrets.FIREBASE_SA_MA }}
          FIREBASE_SA_SU: ${{ secrets.FIREBASE_SA_SU }}
          FIREBASE_SA_BM: ${{ secrets.FIREBASE_SA_BM }}
        run: node sync.js
