name: Sync CRM appointments

on:
  schedule:
    # 10:00 PM Malaysia time (UTC+8) = 14:00 UTC
    - cron: '0 14 * * *'
  workflow_dispatch: {} # lets you also trigger it manually from the Actions tab, for testing

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm install firebase-admin

      - name: Run sync
        env:
          CRM_TOKEN: ${{ secrets.CRM_TOKEN }}
          FIREBASE_SA_GL: ${{ secrets.FIREBASE_SA_GL }}
          FIREBASE_SA_SS2: ${{ secrets.FIREBASE_SA_SS2 }}
          FIREBASE_SA_RU: ${{ secrets.FIREBASE_SA_RU }}
          FIREBASE_SA_MA: ${{ secrets.FIREBASE_SA_MA }}
          FIREBASE_SA_SU: ${{ secrets.FIREBASE_SA_SU }}
          FIREBASE_SA_BM: ${{ secrets.FIREBASE_SA_BM }}
        run: node sync.js
